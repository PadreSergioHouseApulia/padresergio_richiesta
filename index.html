<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richiesta Disponibilità | PadreSergio House</title>
    <link rel="icon" type="image/x-icon" href="modulo_richiesta.ico">
    <style>
        :root { --colore-principale: #5e7153; --colore-secondario: #8c9c83; --sfondo: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background-color: var(--sfondo); padding: 20px; color: #333; }
        .container { max-width: 600px; background: white; margin: 20px auto; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--colore-principale); text-align: center; font-family: 'Georgia', serif; }
        p.desc { text-align: center; color: #666; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; margin-top: 15px; font-size: 13px; font-weight: bold; color: #555; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; margin-top: 5px; }
        button { width: 100%; background: var(--colore-principale); color: white; border: none; padding: 15px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; gap: 0; } .container { padding: 20px; } }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <h1>Richiedi Disponibilità</h1>
    <p class="desc">Compila il modulo per verificare la disponibilità delle date e ricevere la nostra migliore offerta.</p>
    
    <form id="richiestaForm">
        <div class="grid">
            <div><label>Nome *</label><input type="text" id="nome" required></div>
            <div><label>Cognome *</label><input type="text" id="cognome" required></div>
        </div>
        
        <div class="grid">
            <div><label>Email *</label><input type="email" id="email" required></div>
            <div><label>Telefono / WhatsApp *</label><input type="tel" id="telefono" required></div>
        </div>

        <div class="grid">
            <div><label>Data Arrivo *</label><input type="date" id="arrivo" required></div>
            <div><label>Data Partenza *</label><input type="date" id="partenza" required></div>
        </div>
        
        <label>Numero di Ospiti *</label>
        <select id="ospiti" required>
            <option value="1">1 Ospite</option>
            <option value="2" selected>2 Ospiti</option>
            <option value="3">3 Ospiti</option>
            <option value="4">4 Ospiti</option>
            <option value="5+">5 o più Ospiti</option>
        </select>

        <label>Note o richieste particolari</label>
        <textarea id="note" rows="4" placeholder="Es. Viaggiamo con un cagnolino..."></textarea>

        <button type="button" id="btnInvia" onclick="inviaRichiesta()">INVIA RICHIESTA</button>
        <div id="loading" style="display:none; text-align:center; color:#5e7153; margin-top:15px; font-weight:bold;">Invio in corso... ⏳</div>
    </form>
</div>

<script>
    function inviaRichiesta() {
        const form = document.getElementById('richiestaForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }

        document.getElementById('btnInvia').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        const payload = {
            action: "nuovaRichiesta",
            nome: document.getElementById('nome').value,
            cognome: document.getElementById('cognome').value,
            email: document.getElementById('email').value,
            telefono: document.getElementById('telefono').value,
            arrivo: document.getElementById('arrivo').value,
            partenza: document.getElementById('partenza').value,
            ospiti: document.getElementById('ospiti').value,
            note: document.getElementById('note').value
        };

        const LINK_GOOGLE = "https://script.google.com/macros/s/AKfycbzQyMUZjs7HdGLPa_Cdv1HqDbRtjqecHT2uQyyIqRDYStUKwZL1Mrya7VicNDbvSRpC/exec";

        fetch(LINK_GOOGLE, { method: "POST", body: JSON.stringify(payload) })
        .then(() => {
            document.getElementById('form-container').innerHTML = `
                <h2 style="color:#5e7153; text-align:center;">Richiesta Inviata! ✈️</h2>
                <p style="text-align:center; color:#666;">Grazie per averci contattato. Ti risponderemo al più presto con la disponibilità e le tariffe.</p>
            `;
        })
        .catch(() => {
            alert("Errore di connessione. Riprova.");
            document.getElementById('btnInvia').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        });
    }
</script>
</body>
</html>
